type: NamedCredential
category: NamedCredential
input: xml-string
root: NamedCredential
applies_when:
  always: true

nodes:
  - label: NamedCredential
    qname: "NamedCredential:${record.name}"
    props:
      name: "${record.name}"
      endpoint: "${record.endpoint | raw}"
      principalType: "${record.principalType | raw}"
      protocol: "${record.protocol | raw}"
