type: SharingRules
category: SharingRule
input: xml-string
root: SharingRules
applies_when:
  always: true

nodes:
  - label: SharingRule
    iterate: "${record.sharingOwnerRules}"
    qname: "SharingRule:${record.object}.${item.fullName || item.name}"
    props:
      ruleName: "${item.fullName || item.name}"
      object: "${record.object}"
      kind: "owner"
      accessLevel: "${toString(item.accessLevel)}"
      audit: "${item.accessLevel == 'All'}"

  - label: SharingRule
    iterate: "${record.sharingCriteriaRules}"
    qname: "SharingRule:${record.object}.${item.fullName || item.name}"
    props:
      ruleName: "${item.fullName || item.name}"
      object: "${record.object}"
      kind: "criteria"
      accessLevel: "${toString(item.accessLevel)}"
      audit: "${item.accessLevel == 'All'}"

edges:
  - relType: SHARING_GRANTS
    iterate: "${record.sharingOwnerRules}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "CustomObject:${record.object}"
    props:
      accessLevel: "${toString(item.accessLevel)}"
      audit: "${item.accessLevel == 'All'}"

  - relType: SHARING_GRANTS
    iterate: "${record.sharingCriteriaRules}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "CustomObject:${record.object}"
    props:
      accessLevel: "${toString(item.accessLevel)}"
      audit: "${item.accessLevel == 'All'}"

  - relType: SHARING_TO_GROUP
    iterate: "${record.sharingOwnerRules}"
    when: "${item.sharedTo.group}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "Group:${item.sharedTo.group}"

  - relType: SHARING_TO_GROUP
    iterate: "${record.sharingCriteriaRules}"
    when: "${item.sharedTo.group}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "Group:${item.sharedTo.group}"

  - relType: SHARING_TO_ROLE
    iterate: "${record.sharingOwnerRules}"
    when: "${item.sharedTo.role || item.sharedTo.roleAndSubordinates}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "Role:${item.sharedTo.role || item.sharedTo.roleAndSubordinates}"
    props:
      includesSubordinates: "${bool(item.sharedTo.roleAndSubordinates)}"

  - relType: SHARING_TO_ROLE
    iterate: "${record.sharingCriteriaRules}"
    when: "${item.sharedTo.role || item.sharedTo.roleAndSubordinates}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "Role:${item.sharedTo.role || item.sharedTo.roleAndSubordinates}"
    props:
      includesSubordinates: "${bool(item.sharedTo.roleAndSubordinates)}"

  - relType: SHARING_FROM_OWNER_GROUP
    iterate: "${record.sharingOwnerRules}"
    when: "${item.sharedFrom.group}"
    src: "SharingRule:${record.object}.${item.fullName || item.name}"
    dst: "Group:${item.sharedFrom.group}"
